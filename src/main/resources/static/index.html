<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />

        <title>Document</title>
        <link rel="stylesheet" href="css/main.css" />
    </head>
    <body>
        <div class="main">
            <img src="img/main.png" class="main-img" alt="" />
            <div class="mainimg-wrap">
                <div class="button" id="button">
                    <img src="img/screen.png" class="screen" />
                </div>
                <div class="button-two" id="button-two">
                    <img src="img/screen-two.png" class="screen-two" alt="" />
                </div>
                <div class="button-three" id="button-three">
                    <img
                        src="img/screen-three.png"
                        class="screen-three"
                        alt=""
                    />
                </div>
            </div>

            <!-- Первое модальное окно -->
            <div class="modal" id="modal">
                <div class="modal-block">
                    <div class="modal-content">
                        <div class="modal-wrap">
                            <!-- Изображения будут вставлены сюда через JS -->
                        </div>
                        <button class="modal-exit" id="modal-exit">Х</button>
                    </div>
                </div>
            </div>

            <!-- Второе модальное окно -->
            <div class="modal-two" id="modal-two">
                <div class="modal-block">
                    <div class="modal-content">
                        <div class="modal-wrap">
                            <!-- Изображения будут вставлены сюда через JS -->
                        </div>
                        <button class="modal-exit" id="modal-exit-two">
                            Х
                        </button>
                    </div>
                </div>
            </div>

            <!-- Третье модальное окно -->
            <div class="modal-three" id="modal-three">
                <div class="modal-block">
                    <div class="modal-content">
                        <div class="modal-wrap">
                            <!-- Изображения будут вставлены сюда через JS -->
                        </div>
                        <button class="modal-exit" id="modal-exit-three">
                            Х
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <script src="js/script.js"></script>
    </body>
</html>
