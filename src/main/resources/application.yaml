server:
  port: 8080
  ssl:
    enabled: false
spring:
  web:
    resources:
      static-locations: classpath:/static/,file:src/main/resources/static/
  application:
    name: backend
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
  datasource:
    url: jdbc:postgresql://localhost:15432/baza_db
    username: postgres
    password: 1488
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yaml
